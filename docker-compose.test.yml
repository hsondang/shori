services:
  postgres-test:
    image: postgres:16
    container_name: shori-test-postgres
    environment:
      POSTGRES_DB: shori_test
      POSTGRES_USER: shori_test
      POSTGRES_PASSWORD: shori_test
    ports:
      - "5433:5432"
    volumes:
      - shori-test-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shori_test -d shori_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  shori-test-pgdata:
    name: shori-test-pgdata
